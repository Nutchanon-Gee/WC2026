name: Update WC2026 Simulation

on:
  schedule:
    - cron: '0 */3 * * *'   # every 3 hours
  workflow_dispatch:          # also allows manual trigger from GitHub UI
  push:
    branches: [main]          # also runs on every push

jobs:
  simulate:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # needed to push docs/data.js back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        run: |
          python src/preprocess.py
          python src/build_features.py
          python src/train_model.py
          python src/simulate.py 10000

      - name: Commit and push updated data.js
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.js results/sim_results.csv
          git diff --cached --quiet || git commit -m "auto: update simulation $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
